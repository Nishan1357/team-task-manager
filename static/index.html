<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Manager - Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="bg-animation">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <div class="particles" id="particles"></div>
  </div>

  <div class="auth-container">
    <div class="auth-box glass">
      <div class="auth-header">
        <div class="logo-icon">
          <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <h1>Team Task Manager</h1>
        <p class="tagline">Organize. Collaborate. Achieve.</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="login" onclick="switchTab('login', event)">
          <span>Login</span>
        </button>
        <button class="tab" data-tab="signup" onclick="switchTab('signup', event)">
          <span>Sign Up</span>
        </button>
        <div class="tab-indicator"></div>
      </div>

      <form id="login-form" class="auth-form">
        <div class="input-group">
          <span class="input-icon">📧</span>
          <input type="email" id="login-email" placeholder="Email address" required>
        </div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-primary ripple">
          <span class="btn-text">Login</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>

      <form id="signup-form" class="auth-form hidden">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="signup-name" placeholder="Full name" required minlength="2">
        </div>
        <div class="input-group">
          <span class="input-icon">📧</span>
          <input type="email" id="signup-email" placeholder="Email address" required>
        </div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="signup-password" placeholder="Password (min 6 chars)" required minlength="6">
        </div>
        <div class="input-group">
          <span class="input-icon">⚡</span>
          <select id="signup-role">
            <option value="member">👥 Member</option>
            <option value="admin">👑 Admin</option>
          </select>
        </div>
        <button type="submit" class="btn-primary ripple">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>

      <p id="auth-msg" class="msg"></p>
    </div>

    <div class="features-preview">
      <div class="feature-item" style="--delay: 0.1s">
        <span class="feature-icon">🚀</span>
        <span>Lightning Fast</span>
      </div>
      <div class="feature-item" style="--delay: 0.2s">
        <span class="feature-icon">🔐</span>
        <span>Secure JWT</span>
      </div>
      <div class="feature-item" style="--delay: 0.3s">
        <span class="feature-icon">👥</span>
        <span>Team Roles</span>
      </div>
      <div class="feature-item" style="--delay: 0.4s">
        <span class="feature-icon">📊</span>
        <span>Live Dashboard</span>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 20 + 's';
      particle.style.animationDuration = (15 + Math.random() * 15) + 's';
      particlesContainer.appendChild(particle);
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${message}`;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function switchTab(tab, event) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.closest('.tab').classList.add('active');
      const indicator = document.querySelector('.tab-indicator');
      indicator.style.transform = tab === 'login' ? 'translateX(0)' : 'translateX(100%)';
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('auth-msg').textContent = '';
    }

    function setLoading(form, isLoading) {
      const btn = form.querySelector('button[type="submit"]');
      const text = btn.querySelector('.btn-text');
      const loader = btn.querySelector('.btn-loader');
      btn.disabled = isLoading;
      text.classList.toggle('hidden', isLoading);
      loader.classList.toggle('hidden', !isLoading);
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      setLoading(e.target, true);
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        const fd = new FormData();
        fd.append('username', email);
        fd.append('password', password);
        const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('Welcome back! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } catch (err) {
        showToast(err.message, 'error');
        setLoading(e.target, false);
      }
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      setLoading(e.target, true);
      const body = {
        name: document.getElementById('signup-name').value,
        email: document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
        role: document.getElementById('signup-role').value,
      };
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Signup failed');
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } catch (err) {
        showToast(err.message, 'error');
        setLoading(e.target, false);
      }
    });

    document.querySelectorAll('.ripple').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        ripple.className = 'ripple-effect';
        const rect = this.getBoundingClientRect();
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top = (e.clientY - rect.top) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });
  </script>
</body>
</html>
