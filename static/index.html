<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Task Manager - Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>📋 Team Task Manager</h1>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login', event)">Login</button>
        <button class="tab" onclick="switchTab('signup', event)">Sign Up</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <form id="signup-form" class="auth-form hidden">
        <input type="text" id="signup-name" placeholder="Name" required minlength="2">
        <input type="email" id="signup-email" placeholder="Email" required>
        <input type="password" id="signup-password" placeholder="Password (min 6 chars)" required minlength="6">
        <select id="signup-role">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
        <button type="submit">Create Account</button>
      </form>

      <p id="auth-msg" class="msg"></p>
    </div>
  </div>

  <script>
    function switchTab(tab, event) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('auth-msg').textContent = '';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        const fd = new FormData();
        fd.append('username', email);
        fd.append('password', password);
        const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        document.getElementById('auth-msg').textContent = err.message;
      }
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        name: document.getElementById('signup-name').value,
        email: document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
        role: document.getElementById('signup-role').value,
      };
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Signup failed');
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        document.getElementById('auth-msg').textContent = err.message;
      }
    });
  </script>
</body>
</html>
